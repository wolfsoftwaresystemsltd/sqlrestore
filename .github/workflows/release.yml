name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & upload (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset_suffix: linux-x86_64
          - target: aarch64-unknown-linux-musl
            asset_suffix: linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross linker (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: pkg
        run: |
          BIN=target/${{ matrix.target }}/release/sqlrestore
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="sqlrestore-${VERSION}-${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p dist
          cp "$BIN" dist/sqlrestore
          cp README.md LICENSE dist/
          tar -czf "$ARCHIVE" -C dist .
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "sha=$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.sha }}
          draft: false
          generate_release_notes: true
